name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/eyeris

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Release
      packages: write   # push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # ── Frontend build ────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      # ── Release archive (source + pre-built frontend dist/) ───────
      - name: Create release archives
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          DIR="eyeris-${VERSION}"

          rsync -a . "$DIR/" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='frontend/node_modules' \
            --exclude='venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='backend/thumbnails' \
            --exclude='*.db' \
            --exclude='*.sqlite'

          tar -czf "eyeris-${VERSION}.tar.gz" "$DIR/"
          zip -r  "eyeris-${VERSION}.zip"     "$DIR/"
          sha256sum "eyeris-${VERSION}.tar.gz" "eyeris-${VERSION}.zip" > checksums.txt
          echo "Created archives for ${VERSION}"

      # ── Docker ────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Eyeris ${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            eyeris-*.tar.gz
            eyeris-*.zip
            checksums.txt
